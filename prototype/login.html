<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập & Đăng Ký - Mecha Store A.I</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-base);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .auth-page-container::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-cyan-glow) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            z-index: 1;
        }

        .auth-page-container::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-orange-glow) 0%, transparent 70%);
            bottom: -10%;
            left: -10%;
            z-index: 1;
        }

        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        .auth-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .auth-logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-orange));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--bg-base);
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .auth-logo-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0.5rem;
        }

        .auth-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .auth-toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-toggle-link span {
            color: var(--accent-cyan);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .auth-toggle-link span:hover {
            text-shadow: 0 0 8px var(--accent-cyan-glow);
        }

        .btn-auth-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), #00bfff);
            border: none;
            color: var(--bg-base);
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-outfit);
            transition: var(--transition-smooth);
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3);
            margin-top: 0.5rem;
        }

        .btn-auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 243, 255, 0.5);
        }

        .back-to-home {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 20;
            transition: var(--transition-smooth);
        }

        .back-to-home:hover {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>

    <div class="auth-page-container">
        <!-- Back to Store Link -->
        <a href="index.html" class="back-to-home">
            <svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Quay lại Cửa hàng
        </a>

        <!-- Toast Container for Notifications -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Auth Card -->
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">G</div>
                <div class="auth-logo-title">MECHA STORE</div>
            </div>

            <!-- LOGIN FORM -->
            <div id="login-form-section">
                <h2 class="auth-title">Đăng Nhập</h2>
                <div class="form-group">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" placeholder="Nhập email của bạn..." required>
                </div>
                <div class="form-group">
                    <label for="auth-password">Mật khẩu</label>
                    <input type="password" id="auth-password" placeholder="Nhập mật khẩu..." required>
                </div>
                <button class="btn-auth-submit" onclick="submitLoginPageLogin()">Đăng Nhập</button>
                <div class="auth-toggle-link">
                    Chưa có tài khoản? <span onclick="toggleAuthForms()">Đăng ký ngay</span>
                </div>
            </div>

            <!-- REGISTER FORM (Hidden initially) -->
            <div id="register-form-section" style="display: none;">
                <h2 class="auth-title">Đăng Ký Tài Khoản</h2>
                <div class="form-group">
                    <label for="reg-name">Họ và tên</label>
                    <input type="text" id="reg-name" placeholder="Nhập họ và tên..." required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="Nhập email đăng ký..." required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mật khẩu</label>
                    <input type="password" id="reg-password" placeholder="Tạo mật khẩu..." required>
                </div>
                <button class="btn-auth-submit" onclick="submitLoginPageRegister()">Đăng Ký</button>
                <div class="auth-toggle-link">
                    Đã có tài khoản? <span onclick="toggleAuthForms()">Đăng nhập ngay</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulated Users matching index.html
        const SIMULATED_USERS = [
            { email: "admin@gmail.com", password: "admin", name: "Quản trị viên Mecha (Admin)", role: "Admin", id: 1 },
            { email: "customer@gmail.com", password: "user", name: "Nam Gundam (Khách hàng)", role: "Customer", id: 2 }
        ];

        // Apply theme from localStorage on load
        if (localStorage.getItem("gundam_theme_light") === "true") {
            document.body.classList.add("light-theme");
        }

        // Toggle Login vs Register
        function toggleAuthForms() {
            const loginSection = document.getElementById("login-form-section");
            const registerSection = document.getElementById("register-form-section");

            if (loginSection.style.display === "none") {
                loginSection.style.display = "block";
                registerSection.style.display = "none";
            } else {
                loginSection.style.display = "none";
                registerSection.style.display = "block";
            }
        }

        // Toast notification helper
        function showPageToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type === "success" ? "success" : ""}`;
            toast.innerHTML = `
                <svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Handle Login Submission
        function submitLoginPageLogin() {
            const email = document.getElementById("auth-email").value.trim();
            const pass = document.getElementById("auth-password").value;

            if (!email || !pass) {
                showPageToast("Vui lòng nhập đầy đủ email và mật khẩu!", "error");
                return;
            }

            // Find in SIMULATED_USERS
            const user = SIMULATED_USERS.find(u => u.email === email && u.password === pass);
            
            // Check if there are registered users in localStorage
            let localUsers = localStorage.getItem("gundam_registered_users")
                ? JSON.parse(localStorage.getItem("gundam_registered_users"))
                : [];
            
            const localUser = localUsers.find(u => u.email === email && u.password === pass);
            
            const matchedUser = user || localUser;

            if (matchedUser) {
                // Save user login session
                localStorage.setItem("gundam_current_user", JSON.stringify(matchedUser));
                showPageToast("Đăng nhập thành công! Đang chuyển hướng...", "success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showPageToast("Sai Email hoặc Mật khẩu đăng nhập!", "error");
            }
        }

        // Handle Register Submission
        function submitLoginPageRegister() {
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const pass = document.getElementById("reg-password").value;

            if (!name || !email || !pass) {
                showPageToast("Vui lòng điền đầy đủ các thông tin!", "error");
                return;
            }

            // Simple validation
            let localUsers = localStorage.getItem("gundam_registered_users")
                ? JSON.parse(localStorage.getItem("gundam_registered_users"))
                : [];

            if (SIMULATED_USERS.some(u => u.email === email) || localUsers.some(u => u.email === email)) {
                showPageToast("Email này đã tồn tại trên hệ thống!", "error");
                return;
            }

            // Save new user
            const newUser = {
                id: Date.now(),
                email: email,
                password: pass,
                name: name,
                role: "Customer"
            };

            localUsers.push(newUser);
            localStorage.setItem("gundam_registered_users", JSON.stringify(localUsers));
            
            showPageToast("Đăng ký thành công! Đang tự động đăng nhập...", "success");
            localStorage.setItem("gundam_current_user", JSON.stringify(newUser));
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }
    </script>
</body>
</html>
